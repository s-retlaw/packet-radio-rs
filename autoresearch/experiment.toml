[preprocessing]

[soft_decode]
enabled = true

# ── Smart3 core (3 decoders) — proven baseline, do not change ──
# G:freq-50/t2 — best attribution winner, catches de-emphasized + offset signals
[[multi.decoders]]
type = "goertzel"
phase_offset = 2
freq_offset = -50
bpf_bandwidth = 1600.0
energy_llr = true
adaptive_gain = true

# G:narrow/t0 — narrow BPF, nominal frequency, timing phase 0
[[multi.decoders]]
type = "goertzel"
phase_offset = 0
bpf_bandwidth = 1200.0
energy_llr = true
adaptive_gain = true

# G:narrow/t1 — narrow BPF, nominal frequency, timing phase 1
[[multi.decoders]]
type = "goertzel"
phase_offset = 1
bpf_bandwidth = 1200.0
energy_llr = true
adaptive_gain = true

# ── Candidate 4: Goertzel with fixed pre-emphasis for de-emphasis recovery (T2 target) ──
# fixed_preemph_alpha=5000 (~0.15 Q15) provides moderate pre-emphasis boost
# Phase 1 + freq_offset=-30 for diversity from decoder 1
[[multi.decoders]]
type = "goertzel"
phase_offset = 1
freq_offset = -30
bpf_bandwidth = 1600.0
energy_llr = true
adaptive_gain = true
fixed_preemph_alpha = 5000

# ── Candidate 5: DM+PLL with pre-emphasis (complementary algorithm + de-emphasis handling) ──
[[multi.decoders]]
type = "dm"
dm_pll_alpha = 936
dm_adaptive = true
dm_preemph = 3000