# Autoresearch Experiment Config — 5-decoder MCU ensemble
# Starting point: Smart3 (3 attribution-optimal) + 2 complementary candidates
#
# Run:
#   cargo run --release -p benchmark -- autoresearch autoresearch/experiment.toml tests/wav/

[preprocessing]

[soft_decode]
enabled = true

# ── Smart3 core (3 decoders) ──
# G:freq-50/t2 — best attribution winner, catches de-emphasized + offset signals
[[multi.decoders]]
type = "goertzel"
phase_offset = 2
freq_offset = -50
bpf_bandwidth = 1600.0
energy_llr = true
adaptive_gain = true

# G:narrow/t0 — narrow BPF, nominal frequency, timing phase 0
[[multi.decoders]]
type = "goertzel"
phase_offset = 0
bpf_bandwidth = 1200.0
energy_llr = true
adaptive_gain = true

# G:narrow/t1 — narrow BPF, nominal frequency, timing phase 1
[[multi.decoders]]
type = "goertzel"
phase_offset = 1
bpf_bandwidth = 1200.0
energy_llr = true
adaptive_gain = true

# ── Candidate 4: DM+PLL (complementary algorithm) ──
[[multi.decoders]]
type = "dm"
dm_pll_alpha = 936
dm_adaptive = true

# ── Candidate 5: Goertzel with adaptive pre-emphasis ──
[[multi.decoders]]
type = "goertzel"
phase_offset = 0
bpf_bandwidth = 1600.0
energy_llr = true
adaptive_gain = true
adaptive_preemph = true
