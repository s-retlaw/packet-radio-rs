<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>APRS Viewer</title>

    <!-- MapLibre GL JS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>

    <!-- Chart.js with time adapter -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="/style/main.css">
</head>
<body>
    <div class="app-layout">
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <span class="toolbar-title">APRS Viewer</span>
                <div class="connection-status" id="conn-status">
                    <span class="status-dot disconnected" id="status-dot"></span>
                    <span class="status-text" id="status-text">Disconnected</span>
                </div>
            </div>
            <div class="toolbar-center">
                <input type="text" class="search-input" id="search-input"
                       placeholder="Filter stations..." autocomplete="off">
            </div>
            <div class="toolbar-right">
                <div class="source-filter">
                    <button class="source-btn active" data-source="all">All</button>
                    <button class="source-btn" data-source="tnc">RF</button>
                    <button class="source-btn" data-source="aprs-is">NET</button>
                </div>
                <button class="toolbar-btn" id="btn-tracks">Tracks</button>
                <label class="toggle-label">
                    <input type="checkbox" id="show-fcc-nearby"> Hams
                </label>
                <button class="toolbar-btn" id="btn-settings">Settings</button>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="station-list" id="station-list">
                <div class="station-list-header">
                    <span>Stations</span>
                    <span class="station-count" id="station-count">0</span>
                </div>
                <div class="station-list-body">
                    <table class="station-table">
                        <thead>
                            <tr>
                                <th>Call</th>
                                <th>Type</th>
                                <th>Last Heard</th>
                            </tr>
                        </thead>
                        <tbody id="station-tbody"></tbody>
                    </table>
                </div>
            </div>
            <div class="station-detail" id="station-detail">
                <div class="detail-empty">Select a station</div>
            </div>
        </div>

        <!-- Map -->
        <div class="map-container">
            <div id="map-container"></div>

            <!-- Track Management Panel -->
            <div class="track-panel" id="track-panel" style="display:none">
                <div class="track-panel-header">
                    <span class="track-panel-title">Tracked Stations</span>
                    <button class="modal-close" id="track-panel-close">&times;</button>
                </div>
                <div class="track-list" id="track-list">
                    <div class="track-empty">Click "Track" on a station to add tracks</div>
                </div>
                <div id="track-stats-panel"></div>
                <div class="track-time-section">
                    <div class="track-time-presets">
                        <button class="track-time-preset" data-hours="3">3h</button>
                        <button class="track-time-preset" data-hours="6">6h</button>
                        <button class="track-time-preset" data-hours="12">12h</button>
                        <button class="track-time-preset active" data-hours="24">24h</button>
                        <button class="track-time-preset" data-hours="48">48h</button>
                    </div>
                    <div class="track-slider-row">
                        <span class="track-slider-label" id="track-time-start-label">-24h</span>
                        <div class="track-slider-wrap">
                            <input type="range" class="track-slider" id="track-time-start" min="0" max="48" value="24" step="1">
                            <input type="range" class="track-slider" id="track-time-end" min="0" max="48" value="0" step="1">
                        </div>
                        <span class="track-slider-label" id="track-time-end-label">now</span>
                    </div>
                </div>
                <div class="track-panel-footer">
                    <button class="btn btn-sm btn-secondary" id="track-all-btn">Track All</button>
                    <button class="btn btn-sm btn-secondary" id="track-clear-btn">Clear All</button>
                    <button class="btn btn-sm btn-primary" id="track-play-btn">Play</button>
                </div>
            </div>

            <!-- Playback Bar -->
            <div class="playback-bar" id="playback-bar" style="display:none">
                <button class="playback-btn" id="playback-toggle">&#x25B6;</button>
                <input type="range" class="playback-slider" id="playback-slider" min="0" max="0" value="0">
                <span class="playback-time" id="playback-time">--:-- UTC</span>
                <select class="playback-speed" id="playback-speed">
                    <option value="1">1x</option>
                    <option value="2">2x</option>
                    <option value="5" selected>5x</option>
                    <option value="10">10x</option>
                    <option value="50">50x</option>
                </select>
                <button class="playback-btn playback-close" id="playback-close">&times;</button>
            </div>
        </div>

        <!-- Packet Log -->
        <div class="packet-log">
            <div class="packet-log-header">
                <h3>Packet Log</h3>
                <span class="station-count" id="packet-count">0 packets</span>
            </div>
            <div class="packet-log-body">
                <table class="packet-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Source</th>
                            <th>Dest</th>
                            <th>Type</th>
                            <th>Src</th>
                            <th>Summary</th>
                        </tr>
                    </thead>
                    <tbody id="packet-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="modal-close" id="settings-close">&times;</button>
            </div>
            <div class="modal-body">
                <fieldset class="settings-section">
                    <legend>KISS TNC</legend>
                    <div class="settings-row">
                        <label>Enabled</label>
                        <input type="checkbox" id="cfg-tnc-enabled">
                    </div>
                    <div class="settings-row">
                        <label>Host</label>
                        <input type="text" class="settings-input" id="cfg-tnc-host" value="127.0.0.1">
                    </div>
                    <div class="settings-row">
                        <label>Port</label>
                        <input type="number" class="settings-input settings-input-short" id="cfg-tnc-port" value="8001">
                    </div>
                </fieldset>

                <fieldset class="settings-section">
                    <legend>APRS-IS</legend>
                    <div class="settings-row">
                        <label>Enabled</label>
                        <input type="checkbox" id="cfg-aprs-enabled">
                    </div>
                    <div class="settings-row">
                        <label>Host</label>
                        <input type="text" class="settings-input" id="cfg-aprs-host" value="rotate.aprs2.net">
                    </div>
                    <div class="settings-row">
                        <label>Port</label>
                        <input type="number" class="settings-input settings-input-short" id="cfg-aprs-port" value="14580">
                    </div>
                    <div class="settings-row">
                        <label>Callsign</label>
                        <input type="text" class="settings-input" id="cfg-aprs-callsign" placeholder="N0CALL">
                    </div>
                    <div class="settings-row">
                        <label>Passcode</label>
                        <input type="password" class="settings-input settings-input-short" id="cfg-aprs-passcode" placeholder="-1">
                    </div>
                    <div class="settings-row">
                        <label>Filter</label>
                        <input type="text" class="settings-input" id="cfg-aprs-filter" placeholder="r/49/-72/100">
                    </div>
                </fieldset>

                <fieldset class="settings-section">
                    <legend>General</legend>
                    <div class="settings-row">
                        <label>Max Station Age</label>
                        <input type="number" class="settings-input settings-input-short" id="cfg-max-station-age" value="48">
                        <span class="settings-hint">hours</span>
                    </div>
                    <div class="settings-row">
                        <label>Max Track Age</label>
                        <input type="number" class="settings-input settings-input-short" id="cfg-max-track-age" value="48">
                        <span class="settings-hint">hours</span>
                    </div>
                </fieldset>

                <div class="settings-status" id="settings-status" style="display:none"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="settings-cancel">Cancel</button>
                <button class="btn btn-primary" id="settings-save">Save</button>
            </div>
        </div>
    </div>

    <!-- Station Detail Modal -->
    <div class="modal-overlay" id="station-modal" style="display:none">
        <div class="modal-content station-modal">
            <div class="modal-header">
                <span class="modal-callsign" id="station-modal-call"></span>
                <div class="modal-tabs">
                    <button class="modal-tab active" data-tab="info">Info</button>
                    <button class="modal-tab" data-tab="weather">Weather</button>
                    <button class="modal-tab" data-tab="track">Track</button>
                    <button class="modal-tab" data-tab="packets">Packets</button>
                </div>
                <button class="modal-close" id="station-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="tab-panel active" id="tab-info"></div>
                <div class="tab-panel" id="tab-weather"></div>
                <div class="tab-panel" id="tab-track"></div>
                <div class="tab-panel" id="tab-packets"></div>
            </div>
        </div>
    </div>

    <script src="/aprs_symbols.js"></script>
    <script src="/map_init.js"></script>
    <script src="/station_detail.js"></script>
    <script src="/playback.js"></script>
    <script src="/app.js"></script>
</body>
</html>
